name = "ubani-api"
main = "src/index.js"
compatibility_date = "2026-03-06"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "ubani-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "SITES"
bucket_name = "ubani-sites"

[vars]
APP_DOMAIN = "https://ubanihosting.co.za"
YOCO_API_URL = "https://payments.yoco.com/api"
ZOHO_API_URL = "https://api.zoho.com"
OPENAI_API_URL = "https://api.openai.com/v1"
REFERRAL_REWARD_CENTS = 5000
